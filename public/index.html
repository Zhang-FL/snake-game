<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <aside class="leaderboard" id="leaderboard">
    <div class="lb-title">&#x1F3C6; 排行榜</div>

    <div class="user-section">
      <!-- Logged in -->
      <div class="user-info" id="userInfo" style="display:none">
        <span class="user-name" id="userName"></span>
        <button class="btn btn-sm" id="btnLogout">登出</button>
      </div>
      <!-- Logged out: tabs -->
      <div class="auth-tabs" id="authTabs">
        <div class="tab-row">
          <button class="tab-btn active" data-tab="login">登录</button>
          <button class="tab-btn" data-tab="register">注册</button>
        </div>
        <form class="auth-form" id="loginForm">
          <input type="text" class="auth-input" name="username" placeholder="用户名" maxlength="20" autocomplete="off">
          <input type="password" class="auth-input" name="password" placeholder="密码" maxlength="50">
          <div class="auth-msg" id="loginMsg"></div>
          <button type="submit" class="btn btn-sm btn-full">登录</button>
        </form>
        <form class="auth-form" id="registerForm" style="display:none">
          <input type="text" class="auth-input" name="username" placeholder="用户名 (2-20字符)" maxlength="20" autocomplete="off">
          <input type="password" class="auth-input" name="password" placeholder="密码 (至少6位)" maxlength="50">
          <div class="auth-msg" id="registerMsg"></div>
          <button type="submit" class="btn btn-sm btn-full">注册</button>
        </form>
      </div>
    </div>

    <ol class="lb-list" id="lbList"></ol>
    <div class="lb-empty" id="lbEmpty">暂无记录</div>
  </aside>

  <div class="game-container">
    <div class="header">
      <div class="score-box">得分 <span id="score">0</span></div>
      <div class="high-score-box">最高分 <span id="highScore">0</span></div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="controls">
      <button class="btn" id="restartBtn">重新开始</button>
    </div>
    <div class="tip">方向键 / WASD 控制方向  ·  空格暂停</div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
